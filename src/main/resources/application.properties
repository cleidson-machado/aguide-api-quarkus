# ========== DATABASE ==========
# ⚠️  CRÍTICO: Configuração de banco DEPENDE DO PROFILE!
# - dev:  usa ${DB_DEV_NAME}  (quarkus_dev)  -> pode limpar
# - test: usa ${DB_TEST_NAME} (quarkus_test) -> limpa antes de testes
# - prod: usa ${DB_PROD_NAME} (quarkus_db)   -> NUNCA LIMPA!
#
# As configurações específicas estão em:
# - application-dev.properties  (development)
# - application-prod.properties (production)
# - src/test/resources/application.properties (test)
quarkus.datasource.db-kind=postgresql
# Valores padrão (sobrescritos por profile-specific configs)
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/quarkus_dev}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:quarkus}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:quarkus123}
# ========== HIBERNATE ORM ==========
# ?? MUDANÇA CRÍTICA: Agora o Flyway controla o schema, não o Hibernate!
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
# ?? REMOVIDO: quarkus.hibernate-orm.sql-load-script (Flyway vai gerenciar)
# ?? REMOVIDO: quarkus.hibernate-orm.sql-load-script-phase (não precisa mais)
# ========== FLYWAY ==========
# Executa migrações automaticamente na inicialização
quarkus.flyway.migrate-at-start=true
# Cria a tabela flyway_schema_history se não existir
quarkus.flyway.baseline-on-migrate=true
# Versão inicial (útil se você já tem um banco com dados)
quarkus.flyway.baseline-version=0
# Localização dos scripts de migração
quarkus.flyway.locations=db/migration
# Executa repair antes de migrar para corrigir checksums modificados
quarkus.flyway.repair-at-start=true
# ========== CONSOLE & LOGGING (DEV MODE) ==========
# Correção DEFINITIVA para NullPointerException no StartupLogCompressor
# DESABILITA o console interativo que causa o problema
quarkus.console.enabled=false
# Desabilita o console colorido/fancy que está causando problemas
quarkus.log.console.color=false
# Formato simples de log (sem status line interativo)
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
# Aumenta o nível de log das categorias problemáticas para WARN (mais restritivo)
quarkus.log.category."io.quarkus.deployment.console".level=WARN
quarkus.log.category."io.quarkus.dev.console".level=WARN
quarkus.log.category."io.quarkus.bootstrap.classloading".level=WARN
quarkus.log.category."org.aesh".level=WARN
# Reduz o nível de log do Netty para evitar poluição
quarkus.log.category."io.netty".level=INFO
# ========== CORS ==========
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
# ========== JWT SECURITY ==========
# Chaves RSA para assinatura e validação de tokens JWT
# 🔒 SEGURANÇA: Chaves carregadas de arquivos locais (não versionados no Git)
# A pasta security/ está protegida pelo .gitignore
# Cada ambiente (dev/staging/prod) deve ter suas próprias chaves
mp.jwt.verify.publickey.location=security/jwt-public.pem
mp.jwt.sign.key.location=security/jwt-private.pem
# Issuer do token (identificador único da API)
mp.jwt.verify.issuer=https://aguide-ptbr.com.br
smallrye.jwt.sign.issuer=https://aguide-ptbr.com.br
# Tempo de expiração do token (em segundos)
# 3600 = 1 hora | 7200 = 2 horas | 86400 = 24 horas
jwt.expiration.time=${JWT_EXPIRATION_TIME:3600}
# Desabilita autenticação HTTP Basic (usaremos JWT Bearer)
quarkus.http.auth.basic=false
# ✅ HABILITA SmallRye JWT para parsing de claims e @RolesAllowed
# Necessário para que o Quarkus reconheça o claim "groups" do JWT e autorize endpoints com @RolesAllowed
# AuthenticationFilter custom continua gerenciando validação de token (401 errors)
# SmallRye JWT apenas parseia claims para SecurityContext (necessário para 403 authorization)
quarkus.smallrye-jwt.enabled=true
# ⚠️ IMPORTANTE: Autenticação JWT gerenciada por AuthenticationFilter custom
# NÃO usar quarkus.http.auth.permission pois ele retorna 401 genérico sem JSON
# O AuthenticationFilter fornece mensagens de erro detalhadas em JSON
# Path público para documentação e health checks (sem autenticação)
# Endpoints de auth também são públicos (gerenciados pelo filtro)
# quarkus.http.auth.permission.public.paths=/q/*
# quarkus.http.auth.permission.public.policy=permit
# ========== CONFIGURAÇÕES ESPECÍFICAS DE AMBIENTE ==========
# As configurações de HTTP, SSL e Flyway agora estão em:
#   - application-dev.properties  (desenvolvimento)
#   - application-prod.properties (produção)
#
# Para alternar entre ambientes, configure a variável:
#   QUARKUS_PROFILE=dev   ou   QUARKUS_PROFILE=prod
# ========== CONTENT OWNERSHIP VALIDATION ==========
# 🔒 SEGURANÇA: Chave secreta para HMAC-SHA256 de validação de propriedade
# OBRIGATÓRIO: Defina OWNERSHIP_VALIDATION_SECRET no arquivo .env
# Mínimo 32 caracteres para garantir segurança adequada
# Gere com: openssl rand -hex 32
# Sonar Compliance: Sem fallback hardcoded!
ownership.validation.secret=${OWNERSHIP_VALIDATION_SECRET}
